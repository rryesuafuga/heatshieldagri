name: Build Android APK

on:
  push:
    branches: [ main, claude/* ]
    paths:
      - 'Android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Install Android SDK platform 34
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Build Debug APK
      working-directory: Android
      run: |
        gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || {
          echo "===== BUILD FAILED - Last 100 lines ====="
          tail -100 build.log
          exit 1
        }

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: heatshield-agri-debug
        path: Android/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      working-directory: Android
      run: |
        gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log || {
          echo "===== BUILD FAILED - Last 100 lines ====="
          tail -100 build-release.log
          exit 1
        }

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: heatshield-agri-release-unsigned
        path: Android/app/build/outputs/apk/release/*.apk
        retention-days: 30
